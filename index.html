<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vertex FX — Live Currency Converter</title>

<!-- Fonts: Space Grotesk for UI/display, JetBrains Mono for numeric/ticker data (trading-terminal feel) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ============================================================
   1. TOKENS — color, type, spacing. Dark theme is default;
      light theme overrides via [data-theme="light"].
   ============================================================ */
:root{
    /* -- surfaces / ink -- */
    --bg: #060a10;
    --bg-glow-1: rgba(0, 217, 255, 0.14);
    --bg-glow-2: rgba(240, 180, 41, 0.10);
    --card: rgba(16, 22, 30, 0.55);
    --card-solid: #0d131b;
    --card-border: rgba(255, 255, 255, 0.08);
    --card-border-strong: rgba(0, 217, 255, 0.35);
    --input-bg: rgba(255, 255, 255, 0.04);

    /* -- text -- */
    --text-primary: #eef4f8;
    --text-muted: #8298a6;
    --text-faint: #4c5c68;

    /* -- accents -- */
    --accent: #00d9ff;
    --accent-soft: rgba(0, 217, 255, 0.15);
    --gold: #f0b429;
    --success: #2dd4a7;
    --danger: #ff5470;

    /* -- type scale -- */
    --font-display: 'Space Grotesk', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;

    /* -- shape -- */
    --radius-lg: 22px;
    --radius-md: 14px;
    --radius-sm: 9px;

    color-scheme: dark;
}

[data-theme="light"]{
    --bg: #eef2f6;
    --bg-glow-1: rgba(0, 150, 200, 0.10);
    --bg-glow-2: rgba(240, 180, 41, 0.10);
    --card: rgba(255, 255, 255, 0.65);
    --card-solid: #ffffff;
    --card-border: rgba(10, 20, 30, 0.08);
    --card-border-strong: rgba(0, 150, 200, 0.35);
    --input-bg: rgba(10, 20, 30, 0.035);

    --text-primary: #0b1420;
    --text-muted: #56697a;
    --text-faint: #9aa9b5;

    --accent: #0090b3;
    --accent-soft: rgba(0, 144, 179, 0.12);
    --gold: #b8860b;

    color-scheme: light;
}

/* ============================================================
   2. RESET
   ============================================================ */
*, *::before, *::after{ margin:0; padding:0; box-sizing:border-box; }

html{ scroll-behavior:smooth; }

body{
    min-height:100vh;
    font-family: var(--font-display);
    background: var(--bg);
    color: var(--text-primary);
    transition: background .4s ease, color .4s ease;
    overflow-x:hidden;
}

/* ambient glow — the one atmospheric flourish, kept subtle */
body::before, body::after{
    content:'';
    position:fixed;
    width:60vmax; height:60vmax;
    border-radius:50%;
    filter: blur(90px);
    z-index:-1;
    pointer-events:none;
}
body::before{ background:var(--bg-glow-1); top:-20vmax; left:-15vmax; }
body::after{ background:var(--bg-glow-2); bottom:-25vmax; right:-15vmax; }

button{ font-family:inherit; cursor:pointer; }
input, select{ font-family:inherit; }
::selection{ background:var(--accent-soft); color:var(--text-primary); }

/* focus visibility, kept even though buttons are custom-styled */
button:focus-visible, select:focus-visible, input:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:2px;
}

@media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important; }
}

/* ============================================================
   3. LAYOUT SHELL
   ============================================================ */
.page{
    max-width:1080px;
    margin:0 auto;
    padding: clamp(16px, 4vw, 40px);
    display:flex;
    flex-direction:column;
    gap: clamp(18px, 3vw, 28px);
}

/* -------- header -------- */
.site-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
}
.brand{
    display:flex;
    align-items:center;
    gap:10px;
}
.brand-mark{
    width:38px; height:38px;
    border-radius:11px;
    background:linear-gradient(135deg, var(--accent), var(--gold));
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:18px; color:#04141a;
    box-shadow: 0 4px 18px rgba(0,217,255,0.25);
    flex-shrink:0;
}
.brand-text h1{
    font-size: clamp(16px, 2.4vw, 19px);
    font-weight:700;
    letter-spacing:0.2px;
}
.brand-text span{
    font-size:11px;
    color:var(--text-muted);
    letter-spacing:1.5px;
    text-transform:uppercase;
    font-family: var(--font-mono);
}

.theme-toggle{
    display:flex;
    align-items:center;
    gap:8px;
    background: var(--card);
    border:1px solid var(--card-border);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    padding:8px 14px;
    border-radius:999px;
    color:var(--text-primary);
    font-size:13px;
    font-weight:500;
    transition: border-color .25s ease, transform .15s ease;
}
.theme-toggle:hover{ border-color:var(--card-border-strong); transform:translateY(-1px); }
.theme-toggle:active{ transform:translateY(0); }
.theme-icon{ font-size:14px; }

/* -------- ticker tape: signature element -------- */
.ticker{
    position:relative;
    overflow:hidden;
    border-radius:999px;
    border:1px solid var(--card-border);
    background: var(--card);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    padding:10px 0;
}
.ticker::before, .ticker::after{
    content:'';
    position:absolute; top:0; bottom:0; width:40px; z-index:2;
}
.ticker::before{ left:0; background:linear-gradient(90deg, var(--card-solid), transparent); }
.ticker::after{ right:0; background:linear-gradient(270deg, var(--card-solid), transparent); }
.ticker-track{
    display:flex;
    width:max-content;
    gap:36px;
    padding:0 20px;
    animation: scroll-ticker 32s linear infinite;
    font-family: var(--font-mono);
    font-size:13px;
}
.ticker:hover .ticker-track{ animation-play-state:paused; }
@keyframes scroll-ticker{
    from{ transform:translateX(0); }
    to{ transform:translateX(-50%); }
}
.ticker-item{
    display:flex; align-items:center; gap:7px;
    color:var(--text-muted);
    white-space:nowrap;
}
.ticker-item b{ color:var(--text-primary); font-weight:600; }
.ticker-item .up{ color:var(--success); }
.ticker-item .down{ color:var(--danger); }

/* ============================================================
   4. MAIN GRID
   ============================================================ */
.workspace{
    display:grid;
    grid-template-columns: 1.35fr 1fr;
    gap: clamp(16px, 2.5vw, 24px);
    align-items:start;
}
@media (max-width: 820px){
    .workspace{ grid-template-columns: 1fr; }
}

/* -------- glass card base -------- */
.card{
    position:relative;
    background: var(--card);
    border:1px solid var(--card-border);
    border-radius: var(--radius-lg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    padding: clamp(20px, 3.2vw, 30px);
    transition: border-color .3s ease, box-shadow .3s ease;
}
.card:hover{ border-color: var(--card-border-strong); }

.card-head{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:20px;
    gap:10px;
}
.card-head h2{
    font-size:15px;
    letter-spacing:0.4px;
    text-transform:uppercase;
    font-weight:600;
    color:var(--text-primary);
}
.card-head .sub{
    font-size:12px;
    color:var(--text-faint);
    font-family:var(--font-mono);
}

/* -------- converter card -------- */
.field{
    margin-bottom:16px;
}
.field label{
    display:block;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--text-muted);
    margin-bottom:8px;
    font-weight:600;
}
.field-row{
    display:flex;
    gap:10px;
    background: var(--input-bg);
    border:1px solid var(--card-border);
    border-radius: var(--radius-md);
    padding:6px;
    transition: border-color .2s ease, box-shadow .2s ease;
}
.field-row:focus-within{
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
}
.field-row input[type="number"]{
    flex:1;
    min-width:0;
    background:transparent;
    border:none;
    color:var(--text-primary);
    font-family:var(--font-mono);
    font-size: clamp(20px, 3.4vw, 26px);
    font-weight:600;
    padding:10px 8px;
}
.field-row input[type="number"]::-webkit-outer-spin-button,
.field-row input[type="number"]::-webkit-inner-spin-button{
    -webkit-appearance:none; margin:0;
}
.field-row input[type="number"]{ -moz-appearance:textfield; }
.field-row input::placeholder{ color:var(--text-faint); }

.currency-select{
    display:flex;
    align-items:center;
    gap:6px;
    background: var(--card-solid);
    border:1px solid var(--card-border);
    border-radius: var(--radius-sm);
    padding:8px 10px;
    color:var(--text-primary);
    font-size:13px;
    font-weight:600;
    appearance:none;
    -webkit-appearance:none;
    cursor:pointer;
    max-width:132px;
}

/* swap button */
.swap-row{
    display:flex;
    justify-content:center;
    margin: -6px 0 10px;
}
.swap-btn{
    width:42px; height:42px;
    border-radius:50%;
    background: linear-gradient(135deg, var(--accent), #0080a0);
    border:3px solid var(--bg);
    color:#03141a;
    font-size:16px;
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 4px 14px rgba(0,217,255,0.3);
    transition: transform .35s cubic-bezier(.34,1.56,.64,1);
}
.swap-btn:hover{ transform: rotate(180deg) scale(1.06); }
.swap-btn:active{ transform: rotate(180deg) scale(0.94); }

/* result display */
.result-box{
    margin-top:6px;
    padding: 18px;
    border-radius: var(--radius-md);
    background: linear-gradient(135deg, rgba(0,217,255,0.08), rgba(240,180,41,0.05));
    border:1px solid var(--card-border);
    text-align:center;
    position:relative;
    min-height:96px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:4px;
}
.result-value{
    font-family: var(--font-mono);
    font-size: clamp(24px, 4.4vw, 32px);
    font-weight:700;
    color:var(--text-primary);
    word-break:break-word;
}
.result-sub{
    font-size:12.5px;
    color:var(--text-muted);
    font-family: var(--font-mono);
}

/* skeleton / loading */
.skeleton{
    display:inline-block;
    width:70%;
    height:26px;
    border-radius:6px;
    background: linear-gradient(90deg, var(--input-bg) 25%, var(--card-border) 50%, var(--input-bg) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s ease-in-out infinite;
}
@keyframes shimmer{
    0%{ background-position:200% 0; }
    100%{ background-position:-200% 0; }
}

.error-msg{
    color:var(--danger);
    font-size:13px;
    font-family: var(--font-mono);
}

/* action buttons row */
.actions{
    display:flex;
    gap:10px;
    margin-top:18px;
    flex-wrap:wrap;
}
.btn{
    flex:1;
    min-width:120px;
    padding:12px 16px;
    border-radius: var(--radius-sm);
    border:1px solid var(--card-border);
    background: var(--input-bg);
    color:var(--text-primary);
    font-size:13.5px;
    font-weight:600;
    display:flex; align-items:center; justify-content:center; gap:7px;
    transition: transform .15s ease, border-color .2s ease, background .2s ease;
}
.btn:hover{ border-color:var(--card-border-strong); transform:translateY(-2px); }
.btn:active{ transform:translateY(0); }
.btn-primary{
    background: linear-gradient(135deg, var(--accent), #0092b3);
    color:#04141a;
    border:none;
}
.btn-primary:hover{ box-shadow:0 6px 18px rgba(0,217,255,0.3); }

/* meta / last updated line */
.meta-line{
    margin-top:16px;
    font-size:11.5px;
    color:var(--text-faint);
    font-family:var(--font-mono);
    display:flex;
    align-items:center;
    gap:6px;
    flex-wrap:wrap;
}
.dot{
    width:7px; height:7px;
    border-radius:50%;
    background: var(--success);
    box-shadow: 0 0 8px var(--success);
    flex-shrink:0;
}

/* -------- history card -------- */
.history-list{
    display:flex;
    flex-direction:column;
    gap:10px;
    max-height:420px;
    overflow-y:auto;
    padding-right:4px;
}
.history-list::-webkit-scrollbar{ width:5px; }
.history-list::-webkit-scrollbar-thumb{ background:var(--card-border); border-radius:4px; }

.history-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:12px 14px;
    border-radius: var(--radius-sm);
    background: var(--input-bg);
    border:1px solid var(--card-border);
    animation: item-in .3s ease;
}
@keyframes item-in{
    from{ opacity:0; transform:translateY(-6px); }
    to{ opacity:1; transform:translateY(0); }
}
.history-main{ display:flex; flex-direction:column; gap:3px; min-width:0; }
.history-convo{
    font-family:var(--font-mono);
    font-size:13px;
    font-weight:600;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}
.history-time{ font-size:11px; color:var(--text-faint); }

.empty-state{
    text-align:center;
    padding:36px 10px;
    color:var(--text-faint);
    font-size:13px;
}
.empty-state .icon{ font-size:26px; display:block; margin-bottom:8px; }

.clear-history{
    width:100%;
    margin-top:14px;
    padding:10px;
    border-radius: var(--radius-sm);
    border:1px dashed var(--card-border);
    background:transparent;
    color:var(--text-muted);
    font-size:12.5px;
    font-weight:600;
    transition: border-color .2s ease, color .2s ease;
}
.clear-history:hover{ border-color:var(--danger); color:var(--danger); }

/* -------- footer -------- */
.site-footer{
    text-align:center;
    font-size:11.5px;
    color:var(--text-faint);
    font-family:var(--font-mono);
    padding:6px 0 4px;
}

/* -------- toast (copy confirmation) -------- */
.toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--card-solid);
    border:1px solid var(--card-border-strong);
    color:var(--text-primary);
    padding:12px 20px;
    border-radius: 999px;
    font-size:13px;
    font-weight:600;
    box-shadow:0 8px 24px rgba(0,0,0,0.35);
    opacity:0;
    pointer-events:none;
    transition: opacity .3s ease, transform .3s ease;
    z-index:50;
    display:flex; align-items:center; gap:8px;
}
.toast.show{
    opacity:1;
    transform: translateX(-50%) translateY(0);
}

/* -------- small screens fine-tuning -------- */
@media (max-width: 480px){
    .currency-select{ max-width:104px; font-size:12px; padding:8px 6px; }
    .field-row{ flex-wrap:nowrap; }
    .brand-text span{ display:none; }
    .actions{ flex-direction:column; }
    .btn{ width:100%; }
}
</style>
</head>
<body>

<div class="page">

    <!-- ===================== HEADER ===================== -->
    <header class="site-header">
        <div class="brand">
            <div class="brand-mark">V</div>
            <div class="brand-text">
                <h1>Vertex FX</h1>
                <span>Live Exchange Terminal</span>
            </div>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle light and dark theme">
            <span class="theme-icon" id="themeIcon">🌙</span>
            <span id="themeLabel">Dark</span>
        </button>
    </header>

    <!-- ===================== TICKER TAPE ===================== -->
    <div class="ticker" aria-label="Live currency ticker">
        <div class="ticker-track" id="tickerTrack">
            <!-- populated by JS, duplicated once for seamless loop -->
        </div>
    </div>

    <!-- ===================== WORKSPACE ===================== -->
    <main class="workspace">

        <!-- -------- Converter Card -------- -->
        <section class="card" aria-label="Currency converter">
            <div class="card-head">
                <h2>Convert</h2>
                <span class="sub" id="rateHeadline">— / —</span>
            </div>

            <div class="field">
                <label for="amount">You send</label>
                <div class="field-row">
                    <input type="number" id="amount" placeholder="0.00" min="0" inputmode="decimal" value="100">
                    <select class="currency-select" id="from" aria-label="From currency"></select>
                </div>
            </div>

            <div class="swap-row">
                <button class="swap-btn" id="swapBtn" aria-label="Swap currencies" title="Swap currencies">⇅</button>
            </div>

            <div class="field">
                <label for="toAmount">Recipient gets</label>
                <div class="field-row">
                    <input type="number" id="toAmount" placeholder="0.00" min="0" inputmode="decimal" readonly>
                    <select class="currency-select" id="to" aria-label="To currency"></select>
                </div>
            </div>

            <div class="result-box" id="resultBox">
                <span class="result-value" id="resultValue">Enter an amount to convert</span>
                <span class="result-sub" id="resultSub"></span>
            </div>

            <div class="actions">
                <button class="btn btn-primary" id="convertBtn">↻ Refresh rate</button>
                <button class="btn" id="copyBtn">⧉ Copy result</button>
                <button class="btn" id="resetBtn">✕ Reset</button>
            </div>

            <div class="meta-line">
                <span class="dot" id="statusDot"></span>
                <span id="lastUpdated">Fetching live rates…</span>
            </div>
        </section>

        <!-- -------- History Card -------- -->
        <section class="card" aria-label="Conversion history">
            <div class="card-head">
                <h2>Recent conversions</h2>
                <span class="sub">Local only</span>
            </div>

            <div class="history-list" id="historyList">
                <div class="empty-state" id="historyEmpty">
                    <span class="icon">🕓</span>
                    No conversions yet — they'll show up here.
                </div>
            </div>

            <button class="clear-history" id="clearHistory">Clear history</button>
        </section>

    </main>

    <footer class="site-footer">
        Rates via open.er-api.com · Vertex FX is a demo interface, not a financial service.
    </footer>
</div>

<div class="toast" id="toast"><span>✓</span><span id="toastMsg">Copied to clipboard</span></div>

<script>
/* ============================================================
   VERTEX FX — currency converter logic
   Clean ES6+, single responsibility functions, no globals leak
   beyond what's declared here.
   ============================================================ */

// -------- Supported currencies (code -> display info) --------
const CURRENCIES = {
    USD: { name: 'US Dollar',        flag: '🇺🇸' },
    PKR: { name: 'Pakistani Rupee',  flag: '🇵🇰' },
    EUR: { name: 'Euro',             flag: '🇪🇺' },
    GBP: { name: 'British Pound',    flag: '🇬🇧' },
    AED: { name: 'UAE Dirham',       flag: '🇦🇪' },
    SAR: { name: 'Saudi Riyal',      flag: '🇸🇦' },
    INR: { name: 'Indian Rupee',     flag: '🇮🇳' },
    CNY: { name: 'Chinese Yuan',     flag: '🇨🇳' },
    CAD: { name: 'Canadian Dollar',  flag: '🇨🇦' },
    AUD: { name: 'Australian Dollar',flag: '🇦🇺' },
    JPY: { name: 'Japanese Yen',     flag: '🇯🇵' },
};

// Currencies featured on the ticker tape (subset, PKR-centric since that's the app's focus)
const TICKER_PAIRS = ['PKR', 'EUR', 'GBP', 'AED', 'SAR', 'INR', 'CAD', 'AUD'];

// -------- App state --------
const state = {
    rates: null,        // { CODE: rateVsUSD, ... }
    lastUpdatedISO: null,
    previousRates: null, // used to compute ticker up/down arrows across refreshes
    loading: false,
};

// -------- DOM references --------
const el = {
    amount: document.getElementById('amount'),
    toAmount: document.getElementById('toAmount'),
    from: document.getElementById('from'),
    to: document.getElementById('to'),
    swapBtn: document.getElementById('swapBtn'),
    resultBox: document.getElementById('resultBox'),
    resultValue: document.getElementById('resultValue'),
    resultSub: document.getElementById('resultSub'),
    convertBtn: document.getElementById('convertBtn'),
    copyBtn: document.getElementById('copyBtn'),
    resetBtn: document.getElementById('resetBtn'),
    lastUpdated: document.getElementById('lastUpdated'),
    statusDot: document.getElementById('statusDot'),
    rateHeadline: document.getElementById('rateHeadline'),
    tickerTrack: document.getElementById('tickerTrack'),
    historyList: document.getElementById('historyList'),
    historyEmpty: document.getElementById('historyEmpty'),
    clearHistory: document.getElementById('clearHistory'),
    themeToggle: document.getElementById('themeToggle'),
    themeIcon: document.getElementById('themeIcon'),
    themeLabel: document.getElementById('themeLabel'),
    toast: document.getElementById('toast'),
    toastMsg: document.getElementById('toastMsg'),
};

// ============================================================
// SELECT POPULATION
// ============================================================
function buildCurrencyOptions(selectEl, selectedCode){
    selectEl.innerHTML = Object.entries(CURRENCIES)
        .map(([code, info]) =>
            `<option value="${code}" ${code === selectedCode ? 'selected' : ''}>${info.flag} ${code}</option>`
        ).join('');
}

// ============================================================
// FETCH LIVE RATES
// ============================================================
async function fetchRates(){
    setLoadingState(true);
    try{
        const response = await fetch('https://open.er-api.com/v6/latest/USD');
        if(!response.ok) throw new Error('Network response was not ok');

        const data = await response.json();
        if(data.result !== 'success') throw new Error('API returned an error result');

        state.previousRates = state.rates;
        state.rates = data.rates;
        state.lastUpdatedISO = data.time_last_update_utc || new Date().toUTCString();

        renderTicker();
        renderLastUpdated();
        convert(); // recompute with fresh rates
    }catch(err){
        console.error('Rate fetch failed:', err);
        showError('Could not fetch live rates. Check your connection and try again.');
    }finally{
        setLoadingState(false);
    }
}

function setLoadingState(isLoading){
    state.loading = isLoading;
    if(isLoading){
        el.resultValue.innerHTML = '<span class="skeleton"></span>';
        el.resultSub.textContent = '';
        el.statusDot.style.background = 'var(--gold)';
        el.lastUpdated.textContent = 'Fetching live rates…';
    }
}

function showError(message){
    el.resultValue.innerHTML = `<span class="error-msg">⚠ ${message}</span>`;
    el.resultSub.textContent = '';
    el.statusDot.style.background = 'var(--danger)';
    el.lastUpdated.textContent = 'Last fetch failed — tap "Refresh rate" to retry.';
}

// ============================================================
// TICKER TAPE RENDER
// ============================================================
function renderTicker(){
    const items = TICKER_PAIRS.map(code => {
        const rate = state.rates[code];
        const prev = state.previousRates ? state.previousRates[code] : null;
        let arrow = '';
        if(prev){
            arrow = rate > prev ? '<span class="up">▲</span>' : rate < prev ? '<span class="down">▼</span>' : '';
        }
        const info = CURRENCIES[code];
        return `<div class="ticker-item">${info.flag} USD/${code} <b>${rate.toFixed(2)}</b> ${arrow}</div>`;
    });

    // duplicate the sequence once so the scrolling loop is seamless
    const html = items.join('') + items.join('');
    el.tickerTrack.innerHTML = html;
}

function renderLastUpdated(){
    const date = new Date(state.lastUpdatedISO);
    const formatted = isNaN(date) ? state.lastUpdatedISO : date.toLocaleString(undefined, {
        dateStyle: 'medium', timeStyle: 'short'
    });
    el.lastUpdated.textContent = `Rates updated ${formatted}`;
    el.statusDot.style.background = 'var(--success)';
}

// ============================================================
// CONVERSION LOGIC
// ============================================================
function convert(logToHistory = false){
    if(!state.rates) return;

    const amount = parseFloat(el.amount.value);
    const fromCode = el.from.value;
    const toCode = el.to.value;

    el.rateHeadline.textContent = `${fromCode} / ${toCode}`;

    if(isNaN(amount) || amount <= 0){
        el.toAmount.value = '';
        el.resultValue.textContent = 'Enter an amount to convert';
        el.resultSub.textContent = '';
        return;
    }

    // Convert via USD base: amount -> USD -> target
    const amountInUSD = amount / state.rates[fromCode];
    const result = amountInUSD * state.rates[toCode];
    const unitRate = state.rates[toCode] / state.rates[fromCode];

    el.toAmount.value = result.toFixed(2);
    el.resultValue.textContent = `${formatNumber(amount)} ${fromCode} = ${formatNumber(result)} ${toCode}`;
    el.resultSub.textContent = `1 ${fromCode} = ${unitRate.toFixed(4)} ${toCode}`;

    if(logToHistory){
        addHistoryEntry(amount, fromCode, result, toCode);
    }
}

function formatNumber(num){
    return num.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// Debounce so history isn't spammed on every keystroke, while live
// conversion still feels instant.
let historyDebounce;
function onAmountChange(){
    convert(false);
    clearTimeout(historyDebounce);
    historyDebounce = setTimeout(() => convert(true), 900);
}

// ============================================================
// SWAP
// ============================================================
function swapCurrencies(){
    const fromVal = el.from.value;
    el.from.value = el.to.value;
    el.to.value = fromVal;
    convert(true);
}

// ============================================================
// HISTORY (localStorage)
// ============================================================
const HISTORY_KEY = 'vertexfx_history';
const MAX_HISTORY = 8;

function loadHistory(){
    try{
        return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
    }catch{
        return [];
    }
}

function saveHistory(list){
    localStorage.setItem(HISTORY_KEY, JSON.stringify(list));
}

function addHistoryEntry(amount, fromCode, result, toCode){
    const list = loadHistory();
    list.unshift({
        amount, fromCode, result, toCode,
        time: new Date().toISOString(),
    });
    saveHistory(list.slice(0, MAX_HISTORY));
    renderHistory();
}

function renderHistory(){
    const list = loadHistory();

    if(list.length === 0){
        el.historyList.innerHTML = '';
        el.historyList.appendChild(el.historyEmpty);
        el.historyEmpty.style.display = 'block';
        return;
    }

    el.historyList.innerHTML = list.map(item => {
        const time = new Date(item.time).toLocaleString(undefined, { dateStyle:'short', timeStyle:'short' });
        return `
            <div class="history-item">
                <div class="history-main">
                    <span class="history-convo">${formatNumber(item.amount)} ${item.fromCode} → ${formatNumber(item.result)} ${item.toCode}</span>
                    <span class="history-time">${time}</span>
                </div>
            </div>
        `;
    }).join('');
}

function clearHistory(){
    localStorage.removeItem(HISTORY_KEY);
    renderHistory();
}

// ============================================================
// COPY RESULT
// ============================================================
async function copyResult(){
    const text = el.resultValue.textContent;
    if(!text || text.includes('Enter an amount')) return;

    try{
        await navigator.clipboard.writeText(text);
        showToast('Result copied to clipboard');
    }catch{
        showToast('Could not copy — select the text manually');
    }
}

let toastTimer;
function showToast(message){
    el.toastMsg.textContent = message;
    el.toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.toast.classList.remove('show'), 2200);
}

// ============================================================
// RESET
// ============================================================
function resetConverter(){
    el.amount.value = 100;
    el.from.value = 'USD';
    el.to.value = 'PKR';
    convert(false);
}

// ============================================================
// THEME TOGGLE (persisted)
// ============================================================
const THEME_KEY = 'vertexfx_theme';

function applyTheme(theme){
    document.documentElement.setAttribute('data-theme', theme);
    const isLight = theme === 'light';
    el.themeIcon.textContent = isLight ? '☀️' : '🌙';
    el.themeLabel.textContent = isLight ? 'Light' : 'Dark';
    localStorage.setItem(THEME_KEY, theme);
}

function toggleTheme(){
    const current = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
    applyTheme(current === 'light' ? 'dark' : 'light');
}

// ============================================================
// EVENT WIRING
// ============================================================
el.amount.addEventListener('input', onAmountChange);
el.from.addEventListener('change', () => convert(true));
el.to.addEventListener('change', () => convert(true));
el.swapBtn.addEventListener('click', swapCurrencies);
el.convertBtn.addEventListener('click', fetchRates);
el.copyBtn.addEventListener('click', copyResult);
el.resetBtn.addEventListener('click', resetConverter);
el.clearHistory.addEventListener('click', clearHistory);
el.themeToggle.addEventListener('click', toggleTheme);

// ============================================================
// INIT
// ============================================================
(function init(){
    // theme: respect saved preference, else system preference
    const savedTheme = localStorage.getItem(THEME_KEY);
    const systemPrefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
    applyTheme(savedTheme || (systemPrefersLight ? 'light' : 'dark'));

    // currency dropdowns
    buildCurrencyOptions(el.from, 'USD');
    buildCurrencyOptions(el.to, 'PKR');

    // history from previous session
    renderHistory();

    // first live fetch
    fetchRates();
})();
</script>
